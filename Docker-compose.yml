version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: floreria_frontend_dev
    ports:
      - "5173:5173"
    volumes:
      # Hot reload: sincroniza el código local con el contenedor
      - .:/app
      # Evita sobreescribir node_modules del contenedor
      - /app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped